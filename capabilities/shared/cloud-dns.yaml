naftiko: "1.0.0-alpha1"

info:
  label: "Rackspace Cloud DNS"
  description: "Manage DNS zones and records hosted on the Rackspace Cloud."
  tags:
    - Rackspace
    - DNS
    - Networking
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      RACKSPACE_AUTH_TOKEN: RACKSPACE_AUTH_TOKEN
      RACKSPACE_ACCOUNT_ID: RACKSPACE_ACCOUNT_ID

capability:
  consumes:
    - type: http
      namespace: cloud-dns
      baseUri: "https://dns.api.rackspacecloud.com/v1.0"
      description: "Rackspace Cloud DNS API v1.0."
      authentication:
        type: header
        header: X-Auth-Token
        value: "{{env.RACKSPACE_AUTH_TOKEN}}"
      resources:
        - name: domains
          path: "/{accountId}/domains"
          description: "DNS zones."
          operations:
            - name: list-domains
              method: GET
              description: "List all DNS domains for the account."
              inputParameters:
                - { name: accountId, in: path, type: string, required: true, description: "Tenant ID." }
                - { name: limit, in: query, type: integer, required: false, description: "Maximum results (<=100)." }
                - { name: offset, in: query, type: integer, required: false, description: "Pagination offset." }
                - { name: name, in: query, type: string, required: false, description: "Filter by name." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
            - name: create-domains
              method: POST
              description: "Create one or more DNS domains."
              inputParameters:
                - { name: accountId, in: path, type: string, required: true, description: "Tenant ID." }
              body:
                type: json
                data:
                  domains: "{{tools.domains}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
            - name: show-domain
              method: GET
              description: "Get details for a single DNS domain."
              inputParameters:
                - { name: accountId, in: path, type: string, required: true, description: "Tenant ID." }
                - { name: domainId, in: path, type: string, required: true, description: "Domain ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
            - name: delete-domain
              method: DELETE
              description: "Delete a DNS domain."
              inputParameters:
                - { name: accountId, in: path, type: string, required: true, description: "Tenant ID." }
                - { name: domainId, in: path, type: string, required: true, description: "Domain ID." }
                - { name: deleteSubdomains, in: query, type: boolean, required: false, description: "Also delete subdomains." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
        - name: records
          path: "/{accountId}/domains/{domainId}/records"
          description: "DNS records within a domain."
          operations:
            - name: list-records
              method: GET
              description: "List DNS records for a domain."
              inputParameters:
                - { name: accountId, in: path, type: string, required: true, description: "Tenant ID." }
                - { name: domainId, in: path, type: string, required: true, description: "Domain ID." }
                - { name: type, in: query, type: string, required: false, description: "Record type filter." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
            - name: add-records
              method: POST
              description: "Add DNS records to a domain."
              inputParameters:
                - { name: accountId, in: path, type: string, required: true, description: "Tenant ID." }
                - { name: domainId, in: path, type: string, required: true, description: "Domain ID." }
              body:
                type: json
                data:
                  records: "{{tools.records}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
