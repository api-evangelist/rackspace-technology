naftiko: "1.0.0-alpha1"

info:
  label: "Rackspace Offer"
  description: "Browse Rackspace offerings, products, and pricing grids."
  tags:
    - Rackspace
    - Offers
    - Catalog
    - Pricing
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      RACKSPACE_AUTH_TOKEN: RACKSPACE_AUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: offer
      baseUri: "https://offerings.api.rackspacecloud.com"
      description: "Rackspace Offer API v2."
      authentication:
        type: header
        header: X-Auth-Token
        value: "{{env.RACKSPACE_AUTH_TOKEN}}"
      resources:
        - name: offerings
          path: "/v2/offerings"
          description: "Offering catalog."
          operations:
            - name: list-offerings
              method: GET
              description: "List Rackspace offerings."
              inputParameters:
                - { name: lineOfBusiness, in: query, type: string, required: false, description: "Line of business filter (e.g., US_CLOUD)." }
                - { name: status, in: query, type: string, required: false, description: "Filter by ACTIVE or INACTIVE." }
                - { name: limit, in: query, type: integer, required: false, description: "Maximum results (<=100)." }
                - { name: marker, in: query, type: string, required: false, description: "Pagination marker." }
              outputRawFormat: json
              outputParameters:
                - { name: offerings, type: array, value: "$.offerings" }
        - name: products
          path: "/v2/products"
          description: "Product catalog."
          operations:
            - name: list-products
              method: GET
              description: "List products under an offering."
              inputParameters:
                - { name: offeringCode, in: query, type: string, required: false, description: "Offering code filter." }
                - { name: status, in: query, type: string, required: false, description: "ACTIVE or INACTIVE." }
              outputRawFormat: json
              outputParameters:
                - { name: products, type: array, value: "$.products" }
            - name: get-product
              method: GET
              description: "Get product details by code."
              inputParameters:
                - { name: productCode, in: path, type: string, required: true, description: "Product code." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
