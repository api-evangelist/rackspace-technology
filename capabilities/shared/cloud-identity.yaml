naftiko: "1.0.0-alpha1"

info:
  label: "Rackspace Cloud Identity"
  description: "Authenticate users and manage identity (users, roles, tenants, domains) for Rackspace Cloud APIs."
  tags:
    - Rackspace
    - Identity
    - Authentication
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      RACKSPACE_USERNAME: RACKSPACE_USERNAME
      RACKSPACE_API_KEY: RACKSPACE_API_KEY

capability:
  consumes:
    - type: http
      namespace: cloud-identity
      baseUri: "https://identity.api.rackspacecloud.com"
      description: "Rackspace Cloud Identity v2.0 API."
      authentication:
        type: header
        header: X-Auth-Token
        value: "{{env.RACKSPACE_AUTH_TOKEN}}"
      resources:
        - name: tokens
          path: "/v2.0/tokens"
          description: "Authentication tokens."
          operations:
            - name: authenticate
              method: POST
              description: "Authenticate with username and API key, return a service token."
              body:
                type: json
                data:
                  auth:
                    "RAX-KSKEY:apiKeyCredentials":
                      username: "{{env.RACKSPACE_USERNAME}}"
                      apiKey: "{{env.RACKSPACE_API_KEY}}"
              outputRawFormat: json
              outputParameters:
                - { name: token, type: string, value: "$.access.token.id" }
                - { name: serviceCatalog, type: array, value: "$.access.serviceCatalog" }
            - name: validate-token
              method: GET
              description: "Validate a token and return associated user/roles."
              inputParameters:
                - { name: tokenId, in: path, type: string, required: true, description: "Token to validate." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
        - name: users
          path: "/v2.0/users"
          description: "Identity users."
          operations:
            - name: list-users
              method: GET
              description: "List users accessible to the caller."
              outputRawFormat: json
              outputParameters:
                - { name: users, type: array, value: "$.users" }
            - name: get-user
              method: GET
              description: "Get a user by ID."
              inputParameters:
                - { name: userId, in: path, type: string, required: true, description: "User identifier." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$.user" }
        - name: roles
          path: "/v2.0/users/{userId}/roles"
          description: "Role assignments for a user."
          operations:
            - name: list-user-roles
              method: GET
              description: "List global roles assigned to a user."
              inputParameters:
                - { name: userId, in: path, type: string, required: true, description: "User identifier." }
              outputRawFormat: json
              outputParameters:
                - { name: roles, type: array, value: "$.roles" }
