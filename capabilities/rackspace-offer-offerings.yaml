naftiko: 1.0.0-alpha2
info:
  label: Rackspace Offer API — Offerings
  description: 'Rackspace Offer API — Offerings. 1 operations. Lead operation: Get Offerings. Self-contained Naftiko capability
    covering one Rackspace Technology business surface.'
  tags:
  - Rackspace Technology
  - Offerings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RACKSPACE_TECHNOLOGY_API_KEY: RACKSPACE_TECHNOLOGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rackspace-offer-offerings
    baseUri: https://offerings.api.rackspacecloud.com
    description: Rackspace Offer API — Offerings business capability. Self-contained, no shared references.
    resources:
    - name: v2-offerings
      path: /v2/offerings
      operations:
      - name: getofferings
        method: GET
        description: Get Offerings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.RACKSPACE_TECHNOLOGY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rackspace-offer-offerings-rest
    port: 8080
    description: REST adapter for Rackspace Offer API — Offerings. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/offerings
      name: v2-offerings
      description: REST surface for v2-offerings.
      operations:
      - method: GET
        name: getofferings
        description: Get Offerings
        call: rackspace-offer-offerings.getofferings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rackspace-offer-offerings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rackspace Offer API — Offerings. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-offerings
      description: Get Offerings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-offer-offerings.getofferings
      outputParameters:
      - type: object
        mapping: $.
