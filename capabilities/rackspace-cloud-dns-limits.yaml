naftiko: 1.0.0-alpha2
info:
  label: Rackspace Cloud DNS API — Limits
  description: 'Rackspace Cloud DNS API — Limits. 3 operations. Lead operation: List Limits. Self-contained Naftiko capability
    covering one Rackspace Technology business surface.'
  tags:
  - Rackspace Technology
  - Limits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RACKSPACE_TECHNOLOGY_API_KEY: RACKSPACE_TECHNOLOGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rackspace-cloud-dns-limits
    baseUri: https://dns.api.rackspacecloud.com/v1.0
    description: Rackspace Cloud DNS API — Limits business capability. Self-contained, no shared references.
    resources:
    - name: account-limits
      path: /{account}/limits
      operations:
      - name: listlimits
        method: GET
        description: List Limits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-limits-types
      path: /{account}/limits/types
      operations:
      - name: listlimittypes
        method: GET
        description: List Limit Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-limits-type
      path: /{account}/limits/{type}
      operations:
      - name: showlimit
        method: GET
        description: Show Limit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.RACKSPACE_TECHNOLOGY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rackspace-cloud-dns-limits-rest
    port: 8080
    description: REST adapter for Rackspace Cloud DNS API — Limits. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{account}/limits
      name: account-limits
      description: REST surface for account-limits.
      operations:
      - method: GET
        name: listlimits
        description: List Limits
        call: rackspace-cloud-dns-limits.listlimits
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{account}/limits/types
      name: account-limits-types
      description: REST surface for account-limits-types.
      operations:
      - method: GET
        name: listlimittypes
        description: List Limit Types
        call: rackspace-cloud-dns-limits.listlimittypes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{account}/limits/{type}
      name: account-limits-type
      description: REST surface for account-limits-type.
      operations:
      - method: GET
        name: showlimit
        description: Show Limit
        call: rackspace-cloud-dns-limits.showlimit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rackspace-cloud-dns-limits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rackspace Cloud DNS API — Limits. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-limits
      description: List Limits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-cloud-dns-limits.listlimits
      outputParameters:
      - type: object
        mapping: $.
    - name: list-limit-types
      description: List Limit Types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-cloud-dns-limits.listlimittypes
      outputParameters:
      - type: object
        mapping: $.
    - name: show-limit
      description: Show Limit
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-cloud-dns-limits.showlimit
      outputParameters:
      - type: object
        mapping: $.
