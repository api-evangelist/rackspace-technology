naftiko: 1.0.0-alpha2
info:
  label: Rackspace Offer API — Products
  description: 'Rackspace Offer API — Products. 2 operations. Lead operation: Get Products. Self-contained Naftiko capability
    covering one Rackspace Technology business surface.'
  tags:
  - Rackspace Technology
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RACKSPACE_TECHNOLOGY_API_KEY: RACKSPACE_TECHNOLOGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rackspace-offer-products
    baseUri: https://offerings.api.rackspacecloud.com
    description: Rackspace Offer API — Products business capability. Self-contained, no shared references.
    resources:
    - name: v2-products
      path: /v2/products
      operations:
      - name: getproducts
        method: GET
        description: Get Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offeringCode
          in: query
          type: string
        - name: offeringVersion
          in: query
          type: integer
    - name: v2-products-productCode
      path: /v2/products/{productCode}
      operations:
      - name: getproduct
        method: GET
        description: Get Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.RACKSPACE_TECHNOLOGY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rackspace-offer-products-rest
    port: 8080
    description: REST adapter for Rackspace Offer API — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/products
      name: v2-products
      description: REST surface for v2-products.
      operations:
      - method: GET
        name: getproducts
        description: Get Products
        call: rackspace-offer-products.getproducts
        with:
          offeringCode: rest.offeringCode
          offeringVersion: rest.offeringVersion
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/products/{productcode}
      name: v2-products-productcode
      description: REST surface for v2-products-productCode.
      operations:
      - method: GET
        name: getproduct
        description: Get Product
        call: rackspace-offer-products.getproduct
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rackspace-offer-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rackspace Offer API — Products. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-products
      description: Get Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-offer-products.getproducts
      with:
        offeringCode: tools.offeringCode
        offeringVersion: tools.offeringVersion
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product
      description: Get Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-offer-products.getproduct
      outputParameters:
      - type: object
        mapping: $.
