naftiko: 1.0.0-alpha2
info:
  label: Rackspace Cloud DNS API — Domains
  description: 'Rackspace Cloud DNS API — Domains. 13 operations. Lead operation: List Domains. Self-contained Naftiko capability
    covering one Rackspace Technology business surface.'
  tags:
  - Rackspace Technology
  - Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RACKSPACE_TECHNOLOGY_API_KEY: RACKSPACE_TECHNOLOGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rackspace-cloud-dns-domains
    baseUri: https://dns.api.rackspacecloud.com/v1.0
    description: Rackspace Cloud DNS API — Domains business capability. Self-contained, no shared references.
    resources:
    - name: account-domains
      path: /{account}/domains
      operations:
      - name: listdomains
        method: GET
        description: List Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter the listing to domains whose name starts with this string.
      - name: createdomains
        method: POST
        description: Create Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updatedomains
        method: PUT
        description: Update Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedomains
        method: DELETE
        description: Delete Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: array
          description: One or more domain IDs to delete.
          required: true
    - name: account-domains-import
      path: /{account}/domains/import
      operations:
      - name: importdomain
        method: POST
        description: Import Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: account-domains-search
      path: /{account}/domains/search
      operations:
      - name: searchdomains
        method: GET
        description: Search Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Substring of the domain name to match.
          required: true
    - name: account-domains-domainId
      path: /{account}/domains/{domainId}
      operations:
      - name: showdomain
        method: GET
        description: Show Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: showRecords
          in: query
          type: boolean
          description: Include this domain's records in the response.
        - name: showSubdomains
          in: query
          type: boolean
          description: Include this domain's subdomains in the response.
      - name: updatedomain
        method: PUT
        description: Update Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedomain
        method: DELETE
        description: Delete Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deleteSubdomains
          in: query
          type: boolean
          description: When true, all subdomains are deleted along with the domain.
    - name: account-domains-domainId-changes
      path: /{account}/domains/{domainId}/changes
      operations:
      - name: showdomainchanges
        method: GET
        description: Show Domain Changes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: changes
          in: query
          type: string
          description: ISO-8601 timestamp filter; only changes since this date are returned.
    - name: account-domains-domainId-clone
      path: /{account}/domains/{domainId}/clone
      operations:
      - name: clonedomain
        method: POST
        description: Clone Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cloneName
          in: query
          type: string
          description: New name to use for the clone.
          required: true
        - name: cloneSubdomains
          in: query
          type: boolean
        - name: modifyRecordData
          in: query
          type: boolean
        - name: modifyEmailAddress
          in: query
          type: boolean
        - name: modifyComment
          in: query
          type: boolean
    - name: account-domains-domainId-export
      path: /{account}/domains/{domainId}/export
      operations:
      - name: exportdomain
        method: GET
        description: Export Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-domains-domainId-subdomains
      path: /{account}/domains/{domainId}/subdomains
      operations:
      - name: listsubdomains
        method: GET
        description: List Subdomains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.RACKSPACE_TECHNOLOGY_API_KEY}}'
      placement: header
  exposes:
