naftiko: 1.0.0-alpha2
info:
  label: Rackspace Cloud Identity API — SecretQA
  description: 'Rackspace Cloud Identity API — SecretQA. 2 operations. Lead operation: Get Secret QA. Self-contained Naftiko
    capability covering one Rackspace Technology business surface.'
  tags:
  - Rackspace Technology
  - SecretQA
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RACKSPACE_TECHNOLOGY_API_KEY: RACKSPACE_TECHNOLOGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rackspace-cloud-identity-secretqa
    baseUri: https://identity.api.rackspacecloud.com
    description: Rackspace Cloud Identity API — SecretQA business capability. Self-contained, no shared references.
    resources:
    - name: v2.0-users-userId-RAX-KSQA-secretqa
      path: /v2.0/users/{userId}/RAX-KSQA/secretqa
      operations:
      - name: getsecretqa
        method: GET
        description: Get Secret QA
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesecretqa
        method: PUT
        description: Update Secret QA
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.RACKSPACE_TECHNOLOGY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rackspace-cloud-identity-secretqa-rest
    port: 8080
    description: REST adapter for Rackspace Cloud Identity API — SecretQA. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2-0/users/{userid}/rax-ksqa/secretqa
      name: v2-0-users-userid-rax-ksqa-secretqa
      description: REST surface for v2.0-users-userId-RAX-KSQA-secretqa.
      operations:
      - method: GET
        name: getsecretqa
        description: Get Secret QA
        call: rackspace-cloud-identity-secretqa.getsecretqa
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesecretqa
        description: Update Secret QA
        call: rackspace-cloud-identity-secretqa.updatesecretqa
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rackspace-cloud-identity-secretqa-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rackspace Cloud Identity API — SecretQA. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-secret-qa
      description: Get Secret QA
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-cloud-identity-secretqa.getsecretqa
      outputParameters:
      - type: object
        mapping: $.
    - name: update-secret-qa
      description: Update Secret QA
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rackspace-cloud-identity-secretqa.updatesecretqa
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
