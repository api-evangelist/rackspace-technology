naftiko: 1.0.0-alpha2
info:
  label: Rackspace Cloud DNS API — Records
  description: 'Rackspace Cloud DNS API — Records. 5 operations. Lead operation: List Records. Self-contained Naftiko capability
    covering one Rackspace Technology business surface.'
  tags:
  - Rackspace Technology
  - Records
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RACKSPACE_TECHNOLOGY_API_KEY: RACKSPACE_TECHNOLOGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rackspace-cloud-dns-records
    baseUri: https://dns.api.rackspacecloud.com/v1.0
    description: Rackspace Cloud DNS API — Records business capability. Self-contained, no shared references.
    resources:
    - name: account-domains-domainId-records
      path: /{account}/domains/{domainId}/records
      operations:
      - name: listrecords
        method: GET
        description: List Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter by record type (A, AAAA, MX, CNAME, NS, TXT, SRV).
        - name: name
          in: query
          type: string
        - name: data
          in: query
          type: string
      - name: addrecords
        method: POST
        description: Add Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleterecords
        method: DELETE
        description: Delete Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: array
          required: true
    - name: account-domains-domainId-records-recordId
      path: /{account}/domains/{domainId}/records/{recordId}
      operations:
      - name: showrecord
        method: GET
        description: Show Record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleterecord
        method: DELETE
        description: Delete Record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.RACKSPACE_TECHNOLOGY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rackspace-cloud-dns-records-rest
    port: 8080
    description: REST adapter for Rackspace Cloud DNS API — Records. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{account}/domains/{domainid}/records
      name: account-domains-domainid-records
      description: REST surface for account-domains-domainId-records.
      operations:
      - method: GET
        name: listrecords
        description: List Records
        call: rackspace-cloud-dns-records.listrecords
        with:
          type: rest.type
          name: rest.name
          data: rest.data
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addrecords
        description: Add Records
        call: rackspace-cloud-dns-records.addrecords
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleterecords
        description: Delete Records
        call: rackspace-cloud-dns-records.deleterecords
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{account}/domains/{domainid}/records/{recordid}
      name: account-domains-domainid-records-recordid
      description: REST surface for account-domains-domainId-records-recordId.
      operations:
      - method: GET
        name: showrecord
        description: Show Record
        call: rackspace-cloud-dns-records.showrecord
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleterecord
        description: Delete Record
        call: rackspace-cloud-dns-records.deleterecord
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rackspace-cloud-dns-records-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rackspace Cloud DNS API — Records. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-records
      description: List Records
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-cloud-dns-records.listrecords
      with:
        type: tools.type
        name: tools.name
        data: tools.data
      outputParameters:
      - type: object
        mapping: $.
    - name: add-records
      description: Add Records
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rackspace-cloud-dns-records.addrecords
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-records
      description: Delete Records
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rackspace-cloud-dns-records.deleterecords
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: show-record
      description: Show Record
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rackspace-cloud-dns-records.showrecord
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-record
      description: Delete Record
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rackspace-cloud-dns-records.deleterecord
      outputParameters:
      - type: object
        mapping: $.
