aid: rackspace-technology
url: https://raw.githubusercontent.com/api-evangelist/rackspace-technology/refs/heads/main/apis.yml
name: Rackspace Technology
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Cloud
  - Managed Services
  - Multicloud
  - Infrastructure
  - DevOps
description: >-
  Rackspace Technology is a multicloud solutions provider offering managed
  services, professional services, and consulting across cloud infrastructure,
  applications, data, AI, and cybersecurity. The company operates as a trusted
  operator of the full stack from governed private cloud to AI in production,
  with offerings spanning private, public, and hybrid cloud, VMware, OpenStack,
  Kubernetes, Microsoft 365, ERP/CRM, and security services. Rackspace exposes
  a broad set of public APIs covering ticketing, DNS, load balancing,
  monitoring, metrics, cloud orchestration, billing, identity, and customer
  service.
